name: Bug 报告
description: 创建一个 Bug 报告以帮助我们改进 FsBlockLibrary
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您抽出时间报告此问题！
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请清晰简洁地描述问题是什么。
      placeholder: 在此输入...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 触发此问题的具体步骤是什么？
      value: |
        1. 执行某项操作 '...'
        2. 点击了 '...'
        3. 看到了此错误 '...'
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 软件版本号
      description: 您正在使用哪个版本的 FsBlockLibrary？
      placeholder: e.g. v1.2.0
    validations:
      required: true
  - type: input
    id: cad-version
    attributes:
      label: CAD 宿主版本
      description: 您的 CAD 是什么版本？
      placeholder: e.g. AutoCAD 2025 / ZWCAD 2022
    validations:
      required: true
