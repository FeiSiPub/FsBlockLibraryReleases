name: 功能建议
description: 提交针对 FsBlockLibrary 的新功能或改进建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您为 FsBlockLibrary 提出改进建议！
  - type: textarea
    id: problem
    attributes:
      label: 您的建议是否与某个问题相关？
      description: 请清晰简洁地描述该问题。例如：当使用 [特性] 时我感到沮丧，因为...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 您期望的解决方案
      description: 清晰简洁地描述您想要发生的事情。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 您考虑过的替代方案
      description: 清晰简洁地描述您考虑过的任何替代解决方案或功能。
    validations:
      required: false
